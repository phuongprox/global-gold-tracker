name: gold_app_tracker
description: A Flutter gold price tracking application

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & State Management
  provider: ^6.0.5
  fl_chart: ^0.68.0
  
  # Networking & API
  http: ^1.1.0
  
  # Storage & Database
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  
  # Utilities
  intl: ^0.18.1
  connectivity_plus: ^5.0.0
  url_launcher: ^6.2.5
  
  # XML parsing for RSS
  xml: ^6.3.0
  
  marquee: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true